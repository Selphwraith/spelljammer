<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fentheris — Surface</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
  }

  /* ── HUD bar ─────────────────────────────────────────────────── */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    height: 36px; z-index: 20;
    background: rgba(8,4,16,0.92);
    border-bottom: 1px solid rgba(120,80,40,0.5);
    display: flex; align-items: center; gap: 16px;
    padding: 0 12px;
    font-size: 11px; color: #d4b896; letter-spacing: 1px;
  }
  #hud-title { font-family: 'Georgia', serif; font-size: 13px; color: #e8c87a; letter-spacing: 2px; }
  #hud-clock { color: #aaa; margin-left: auto; }
  #hud-fatigue { padding: 2px 8px; border-radius: 2px; font-size: 10px; }
  #hud-fatigue.fresh    { background:#001a0a; color:#44ee88; border:1px solid rgba(34,170,85,0.3); }
  #hud-fatigue.fatigued { background:#1a0800; color:#ff8844; border:1px solid rgba(170,68,0,0.3); }
  #hud-fatigue.exhausted{ background:#1a0000; color:#ff4444; border:1px solid rgba(170,0,0,0.3); }

  /* Main canvas — pointer-events:none so d-pad buttons behind it receive touch events */
  #surface-canvas {
    position: absolute; top: 36px; left: 0;
    width: 100%; height: calc(100% - 36px - 48px);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: default;
    pointer-events: none;
  }

  /* ── Bottom bar ──────────────────────────────────────────────── */
  #bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 48px; z-index: 20;
    background: rgba(8,4,16,0.92);
    border-top: 1px solid rgba(120,80,40,0.5);
    display: flex; align-items: center; gap: 10px;
    padding: 0 12px;
  }
  .hud-btn {
    font-family: 'Georgia', serif; font-size: 10px; letter-spacing: 1px;
    padding: 6px 14px; border-radius: 3px; cursor: pointer;
    text-transform: uppercase; border: 1px solid; transition: all 0.15s;
  }
  #btn-return {
    border-color: rgba(100,60,20,0.7); background: rgba(20,10,0,0.88); color: #c8a060;
  }
  #btn-return:hover { border-color: #d4a060; color: #ffd080; }
  #btn-rest {
    border-color: rgba(60,40,100,0.7); background: rgba(10,5,20,0.88); color: #9988cc;
  }
  #btn-rest:hover { border-color: #9988ff; color: #ccbbff; }
  #status-text {
    margin-left: auto; font-size: 10px; color: #887766;
    font-style: italic; letter-spacing: 0.5px;
  }

  /* ── Dialogue box ────────────────────────────────────────────── */
  #dialogue-box {
    position: absolute; bottom: 60px; left: 10px; right: 10px;
    background: rgba(8,4,16,0.96); border: 1px solid rgba(180,140,60,0.5);
    border-radius: 4px; padding: 14px 16px;
    z-index: 30; display: none;
    font-size: 12px; color: #d4c09a; line-height: 1.7;
    max-height: 140px; overflow-y: auto;
  }
  #dialogue-box .dlg-name {
    font-family: 'Georgia', serif; font-size: 13px;
    color: #e8c87a; margin-bottom: 6px; letter-spacing: 1px;
  }
  #dialogue-box .dlg-close {
    position: absolute; top: 8px; right: 10px;
    background: none; border: none; color: #887744;
    font-size: 14px; cursor: pointer;
  }
  #dialogue-box .dlg-close:hover { color: #ffd080; }

  /* -- Mobile joystick --------------------------------------------------- */
  #surf-joy-zone {
    position:absolute; bottom:68px; left:18px;
    width:104px; height:104px; z-index:25;
    display:none; touch-action:none; pointer-events:all;
  }
  #surf-joy-base { width:104px; height:104px; border-radius:50%;
    background:rgba(80,50,10,0.18); border:1px solid rgba(180,140,60,0.28); position:relative; }
  #surf-joy-knob { position:absolute; top:50%; left:50%;
    width:40px; height:40px; border-radius:50%;
    background:rgba(200,160,80,0.30); border:1px solid rgba(220,180,80,0.55);
    transform:translate(-50%,-50%); pointer-events:none; }
  #surf-act-btn {
    position:absolute; bottom:80px; right:22px;
    width:52px; height:52px; border-radius:50%;
    background:rgba(40,20,5,0.88); border:1px solid rgba(180,140,60,0.45);
    color:#e8c87a; font-size:18px;
    display:none; align-items:center; justify-content:center;
    cursor:pointer; z-index:25; touch-action:none; pointer-events:all;
    user-select:none; -webkit-user-select:none;
  }
  #surf-act-btn:active { background:rgba(100,70,10,0.95); }

  /* -- Captain HUD bar ---------------------------------------------------- */
  #hud-captain { display:flex; align-items:center; gap:6px; margin-left:6px; }
  #hud-cap-lv  { color:#e8c87a; font-size:10px; white-space:nowrap; }
  #hud-cap-hp  { color:#cc7777; font-size:10px; white-space:nowrap; }
  .hud-hp-mini { display:inline-block; width:44px; height:5px;
    background:#330000; border-radius:2px; overflow:hidden; vertical-align:middle; }
  .hud-hp-mini-fill { height:100%; background:#cc4444; transition:width 0.2s; }

  /* -- Surface Combat Overlay --------------------------------------------- */
  #surf-combat {
    position:absolute; inset:0; z-index:45;
    background:rgba(2,1,8,0.98);
    display:none; flex-direction:column; align-items:stretch;
    font-family:'Courier New',monospace; overflow:hidden;
  }
  #sc-scene { width:100%; height:210px; flex-shrink:0; display:block; background:#000; }
  #sc-log {
    flex:1 1 auto; min-height:52px; max-height:90px; overflow-y:auto;
    padding:5px 10px; font-size:10px; color:#998877; line-height:1.65;
    border-top:1px solid rgba(100,70,20,0.25);
    border-bottom:1px solid rgba(100,70,20,0.25);
  }
  .sc-log-hit  { color:#dd8855; } .sc-log-good { color:#77cc77; }
  .sc-log-warn { color:#ffaa44; } .sc-log-info { color:#554433; }
  #sc-menu { flex-shrink:0; padding:8px 10px 10px; display:flex; flex-direction:column; gap:5px; }
  #sc-menu-cats { display:flex; gap:6px; }
  .sc-cat {
    flex:1; padding:9px 4px; font-family:'Courier New',monospace;
    font-size:10px; letter-spacing:1px; text-transform:uppercase;
    border-radius:3px; cursor:pointer; border:1px solid rgba(180,140,60,0.3);
    background:rgba(14,7,0,0.9); color:#887755; transition:all 0.1s;
    user-select:none; -webkit-user-select:none;
  }
  .sc-cat.active { background:rgba(50,28,4,0.95); border-color:#c89040; color:#ffd080; }
  .sc-cat:disabled { opacity:0.25; cursor:default; }
  .sc-cat-flee { border-color:rgba(80,55,25,0.3); color:#665544; }
  #sc-menu-sub { display:flex; flex-direction:column; gap:4px; min-height:40px; }
  .sc-sub {
    padding:9px 14px; font-family:'Courier New',monospace;
    font-size:10px; letter-spacing:0.5px;
    border-radius:2px; cursor:pointer; border:1px solid rgba(90,60,15,0.2);
    background:rgba(6,3,0,0.8); color:#998866;
    display:flex; justify-content:space-between; align-items:center;
    transition:all 0.1s; user-select:none; -webkit-user-select:none;
  }
  .sc-sub.focused { background:rgba(42,22,4,0.95); border-color:#aa7733; color:#e8c87a; }
  .sc-sub:disabled { opacity:0.25; cursor:default; }
  .sc-sub-hint { font-size:9px; color:#554433; margin-left:8px; }

  /* -- Surface Shop Overlay ---------------------------------------------- */
  #surf-shop {
    position:absolute; inset:0; z-index:35;
    background:rgba(4,2,12,0.97);
    display:none; flex-direction:column; align-items:stretch;
    font-family:'Courier New',monospace; color:#d4b896; overflow:hidden;
  }
  #surf-shop-hdr {
    display:flex; align-items:center; gap:10px; padding:10px 14px 8px;
    border-bottom:1px solid rgba(180,140,60,0.25); flex-shrink:0;
  }
  #surf-shop-npc  { flex:1; font-family:'Georgia',serif; font-size:13px; color:#e8c87a; letter-spacing:1px; }
  #surf-shop-ts   { font-size:11px; color:#ffcc44; white-space:nowrap; }
  #surf-shop-close{ background:none; border:none; color:#887744; font-size:16px; cursor:pointer; padding:0 4px; }
  #surf-shop-close:hover { color:#ffd080; }
  #surf-shop-tabs { display:flex; border-bottom:1px solid rgba(100,70,20,0.3); flex-shrink:0; }
  .surf-stab {
    flex:1; padding:8px; font-family:'Courier New',monospace;
    font-size:10px; letter-spacing:2px; text-transform:uppercase;
    border:none; background:none; color:#665544; cursor:pointer;
    border-bottom:2px solid transparent; transition:all 0.1s;
  }
  .surf-stab.active { color:#e8c87a; border-bottom-color:#c89040; }
  #surf-shop-list { flex:1; overflow-y:auto; padding:8px 10px; display:flex; flex-direction:column; gap:5px; }
  .surf-shop-row {
    display:flex; align-items:center; gap:8px; padding:8px 12px;
    border:1px solid rgba(100,70,20,0.2); border-radius:2px;
    background:rgba(8,4,0,0.7); cursor:pointer; transition:all 0.1s;
  }
  .surf-shop-row:hover:not(.cant-afford):not(.no-action) { background:rgba(38,20,3,0.9); border-color:#aa7733; }
  .surf-shop-row.cant-afford { opacity:0.32; cursor:default; }
  .surf-shop-row.no-action   { cursor:default; }
  .surf-shop-item-name { flex:1; font-size:10px; color:#d4b896; line-height:1.5; }
  .surf-shop-item-sub  { font-size:9px; color:#554433; display:block; }
  .surf-shop-item-price{ font-size:11px; color:#ffcc44; white-space:nowrap; }
  #surf-shop-msg { padding:6px 14px 8px; font-size:10px; font-style:italic; color:#554433; flex-shrink:0; min-height:26px; }

  /* ── Surface overlay shared base ────────────────────────────────── */
  .surf-ovl {
    position:absolute; inset:0; z-index:40;
    background:rgba(4,2,12,0.97);
    display:none; flex-direction:column; align-items:stretch;
    font-family:'Courier New',monospace; color:#d4b896; overflow:hidden;
  }
  .surf-ovl-hdr {
    display:flex; align-items:center; padding:10px 14px 8px; flex-shrink:0;
    border-bottom:1px solid rgba(180,140,60,0.22);
    font-family:'Georgia',serif; font-size:13px; color:#e8c87a; letter-spacing:2px;
  }
  .surf-ovl-hdr span { flex:1; }
  .surf-ovl-close {
    background:none; border:none; color:#887744; font-size:17px;
    cursor:pointer; padding:0 2px; line-height:1;
  }
  .surf-ovl-close:hover { color:#ffd080; }
  .surf-ovl-body { flex:1; overflow-y:auto; padding:10px 14px; display:flex; flex-direction:column; gap:8px; }

  /* ── Stats overlay ───────────────────────────────────────────────── */
  .stat-section { border-bottom:1px solid rgba(100,70,20,0.2); padding-bottom:8px; }
  .stat-title   { font-size:9px; letter-spacing:2px; color:#554433; text-transform:uppercase; margin-bottom:5px; }
  .stat-row     { display:flex; justify-content:space-between; font-size:10px; padding:2px 0; }
  .stat-label   { color:#887755; }
  .stat-val     { color:#d4b896; }
  .stat-xp-bar  { height:5px; background:#1a0a00; border-radius:2px; margin-top:4px; overflow:hidden; }
  .stat-xp-fill { height:100%; background:#cc8822; transition:width 0.4s; }

  /* ── Inventory overlay ───────────────────────────────────────────── */
  .inv-empty { font-size:10px; color:#443322; font-style:italic; padding:8px 0; }
  .inv-item  {
    display:flex; align-items:center; gap:8px; padding:8px 10px;
    border:1px solid rgba(100,70,20,0.18); border-radius:2px;
    background:rgba(8,4,0,0.65);
  }
  .inv-item-name { flex:1; font-size:10px; color:#d4b896; line-height:1.5; }
  .inv-item-sub  { font-size:9px; color:#554433; display:block; }
  .inv-item-qty  { font-size:10px; color:#887755; white-space:nowrap; }
  .inv-use-btn   {
    padding:4px 10px; border-radius:2px; cursor:pointer; white-space:nowrap;
    border:1px solid rgba(100,180,60,0.3); background:rgba(8,16,4,0.8);
    color:#88cc88; font-size:9px; font-family:'Courier New',monospace;
  }
  .inv-use-btn:hover { border-color:#88cc88; }

  /* ── Save overlay ────────────────────────────────────────────────── */
  .save-slot-row {
    display:flex; align-items:center; gap:8px; padding:9px 10px;
    border:1px solid rgba(100,70,20,0.18); border-radius:2px;
    background:rgba(8,4,0,0.65);
  }
  .save-slot-info { flex:1; }
  .save-slot-name { font-size:10px; color:#e8c87a; }
  .save-slot-detail { font-size:9px; color:#554433; margin-top:2px; }
  .save-slot-btns { display:flex; gap:5px; flex-shrink:0; }
  .save-btn {
    padding:5px 10px; border-radius:2px; cursor:pointer; font-size:9px;
    font-family:'Courier New',monospace; letter-spacing:0.5px; white-space:nowrap;
    border:1px solid rgba(180,140,60,0.3); background:rgba(14,7,0,0.9); color:#d4b896;
  }
  .save-btn:hover { border-color:#d4a060; color:#ffd080; }
  .save-btn-load { border-color:rgba(60,120,60,0.4); color:#88cc88; }
  .save-btn-load:hover { border-color:#88cc88; }
  .save-btn-del  { border-color:rgba(120,40,20,0.3); color:#884422; }
  .save-btn-del:hover { border-color:#cc4422; color:#ff6644; }
  .save-autosave-lbl {
    font-size:9px; letter-spacing:2px; color:#443322; text-transform:uppercase;
    margin-bottom:4px; margin-top:4px;
  }

  /* ── Bottom bar buttons ──────────────────────────────────────────── */
  .hud-btn-sm {
    padding:5px 10px; font-family:'Courier New',monospace; font-size:9px;
    letter-spacing:0.5px; color:#aaa; background:rgba(14,7,0,0.8);
    border:1px solid rgba(120,80,40,0.3); border-radius:2px; cursor:pointer;
    flex-shrink:0; white-space:nowrap;
    user-select:none; -webkit-user-select:none;
  }
  .hud-btn-sm:hover { border-color:#d4a060; color:#e8c87a; }
  .hud-btn-sm.active { border-color:#cc8833; color:#ffcc44; }

  /* ── Minimap ─────────────────────────────────────────────────────── */
  #surf-minimap-shell {
    position:absolute; bottom:56px; right:10px; z-index:22;
    display:flex; flex-direction:column; align-items:flex-end; gap:3px;
  }
  #surf-minimap-toggle {
    background:rgba(8,4,16,0.88); border:1px solid rgba(120,80,40,0.35);
    border-radius:3px; color:#887744; font-size:9px; padding:3px 6px;
    cursor:pointer; font-family:'Courier New',monospace; letter-spacing:1px;
    user-select:none; -webkit-user-select:none;
  }
  #surf-minimap-toggle:hover { color:#d4a060; }
  #surf-minimap {
    border-radius:50%; border:1px solid rgba(180,140,60,0.35);
    display:block; background:#050208;
    box-shadow:0 0 12px rgba(0,0,0,0.6);
  }
  #surf-minimap-shell.minimized #surf-minimap { display:none; }

  /* ── Transition overlay ──────────────────────────────────────── */
  #transition-overlay {
    position: absolute; inset: 0; background: #000;
    z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #transition-overlay.fade-in  { opacity: 1; pointer-events: all; }
  #transition-overlay.fade-out { opacity: 0; }
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <span id="hud-title">⚔ FENTHERIS — SURFACE</span>
  <span id="hud-pos"></span>
  <span id="hud-clock">Day 1 — 06:00</span>
  <span id="hud-fatigue" class="fresh">✦ Fresh</span>
  <div id="hud-captain">
    <span id="hud-cap-lv">Lv 1</span>
    <span class="hud-hp-mini"><span class="hud-hp-mini-fill" id="hud-cap-hpf" style="width:100%"></span></span>
    <span id="hud-cap-hp">30/30</span>
  </div>
</div>

<!-- Main canvas -->
<canvas id="surface-canvas"></canvas>
<!-- Click catcher — receives taps on the game world for dialogue advance -->
<div id="canvas-click-zone" style="position:absolute;top:36px;left:0;width:100%;height:calc(100% - 36px - 48px);z-index:5;"></div>

<!-- Dialogue box -->
<div id="dialogue-box">
  <div class="dlg-name" id="dlg-name">—</div>
  <div id="dlg-text"></div>
  <button class="dlg-close" onclick="closeDlg()">✕</button>
</div>

<!-- Mobile joystick (left thumb) -->
<div id="surf-joy-zone"><div id="surf-joy-base"><div id="surf-joy-knob"></div></div></div>
<!-- Mobile action button (right thumb) -->
<div id="surf-act-btn">✦</div>

<!-- Bottom bar -->
<div id="bottom-bar">
  <button class="hud-btn" id="btn-return" onclick="returnToShip()">&#9973; Return</button>
  <button class="hud-btn" id="btn-rest"   onclick="surfaceRest()">&#127769; Rest</button>
  <button class="hud-btn-sm" onclick="surfOpenOvl('stats')">&#9876; Stats</button>
  <button class="hud-btn-sm" onclick="surfOpenOvl('inv')">&#127869; Inv</button>
  <button class="hud-btn-sm" onclick="surfOpenOvl('save')">&#128190; Save</button>
  <span id="status-text" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:9px;">Exploring the surface of Fentheris.</span>
</div>

<!-- Minimap -->
<div id="surf-minimap-shell">
  <button id="surf-minimap-toggle" onclick="surfMinimapToggle()">MAP &#9660;</button>
  <canvas id="surf-minimap" width="110" height="110"></canvas>
</div>

<!-- Stats Overlay -->
<div class="surf-ovl" id="surf-ovl-stats">
  <div class="surf-ovl-hdr">
    <span>&#9876; CAPTAIN STATS</span>
    <button class="surf-ovl-close" onclick="surfCloseOvl('stats')">&#10005;</button>
  </div>
  <div class="surf-ovl-body" id="surf-stats-body"></div>
</div>

<!-- Inventory Overlay -->
<div class="surf-ovl" id="surf-ovl-inv">
  <div class="surf-ovl-hdr">
    <span>&#127869; INVENTORY</span>
    <button class="surf-ovl-close" onclick="surfCloseOvl('inv')">&#10005;</button>
  </div>
  <div class="surf-ovl-body" id="surf-inv-body"></div>
</div>

<!-- Save Overlay -->
<div class="surf-ovl" id="surf-ovl-save">
  <div class="surf-ovl-hdr">
    <span>&#128190; SAVE / LOAD</span>
    <button class="surf-ovl-close" onclick="surfCloseOvl('save')">&#10005;</button>
  </div>
  <div class="surf-ovl-body" id="surf-save-body"></div>
</div>

<!-- Transition overlay -->

<!-- Surface Combat Overlay -->
<div id="surf-combat">
  <canvas id="sc-scene"></canvas>
  <div id="sc-log"></div>
  <div id="sc-menu">
    <div id="sc-menu-cats">
      <button class="sc-cat active" id="sc-cat-attack" onclick="cbtMenuCat('attack')">&#9876; Attack</button>
      <button class="sc-cat" id="sc-cat-item" onclick="cbtMenuCat('item')">&#9879; Items</button>
      <button class="sc-cat sc-cat-flee" onclick="cbtFlee()">&#127939; Flee</button>
    </div>
    <div id="sc-menu-sub"></div>
  </div>
</div>
<!-- Surface Shop Overlay -->
<div id="surf-shop">
  <div id="surf-shop-hdr">
    <span id="surf-shop-npc">Trader</span>
    <span id="surf-shop-ts">0 TS</span>
    <button id="surf-shop-close" onclick="closeSurfShop()">&#10005;</button>
  </div>
  <div id="surf-shop-tabs">
    <button class="surf-stab active" id="surf-stab-buy"  onclick="surfShopTab('buy')">Buy</button>
    <button class="surf-stab"        id="surf-stab-sell" onclick="surfShopTab('sell')">Sell</button>
  </div>
  <div id="surf-shop-list"></div>
  <div id="surf-shop-msg">Select an item to trade.</div>
</div>

<div id="transition-overlay"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// FENTHERIS SURFACE — surface.html
// Orthographic RPG view. Sprite-sheet animation, tilemap, NPC dialogue,
// sessionStorage handshake with index.html.
//
// ── Image file reference guide ──────────────────────────────────────────
// All images go in surface/ folder (sibling to index.html):
//
//   surface/tileset.png
//     A single PNG containing all terrain tiles in a 16×16 grid layout.
//     Each tile is 32×32 pixels. Minimum sheet: 128×128 px (4×4 tiles).
//     Required tiles (by grid position, column,row starting 0,0):
//       0,0  — Grass (default walkable ground)
//       1,0  — Dirt path
//       2,0  — Stone cobblestone
//       3,0  — Tall grass (slower, walkable)
//       0,1  — Tree top (impassable)
//       1,1  — Tree trunk (impassable)
//       2,1  — Water (impassable, animated optional)
//       3,1  — Sand
//       0,2  — Stone wall (impassable)
//       1,2  — Stone floor (inside buildings)
//       2,2  — Door (open — walkable, triggers transition)
//       3,2  — Wooden floor
//       0,3  — Mountain/rock (impassable)
//       1,3  — Cave entrance (impassable placeholder)
//       2,3  — Flower patch (walkable, decorative)
//       3,3  — Cliff edge (impassable)
//     Style: medieval pixel art, top-down orthographic, 32×32 px per tile.
//     Palette: earthy greens, browns, greys. Consistent pixel art light source (top-left).
//
//   surface/player.png
//     Sprite sheet for the player character.

  ambient_field:  'surface/sounds/ambient_field.mp3',  // grassland/forest loop
};

// Load all sounds — fetch HEAD first so missing files never throw
function _loadSurfSounds() {
  // Directly create Audio elements — no fetch needed.
  // If a file is missing the browser fires an error event which we ignore.
  Object.entries(SURF_SOUND_DATA).forEach(([key, path]) => {
    try {
      const a = new Audio();
      a.preload = 'auto';
      a.onerror = () => { delete _SURF_SFX[key]; }; // remove if file 404s
      a.src = path;
      _SURF_SFX[key] = a; // register immediately; onerror cleans up if missing
    } catch(_) {}
  });
}

// Play a surface sound — completely safe if key is missing
function sfx(key, vol = 1.0) {
  if (_SURF_MUTED || !_SURF_SFX[key]) return;
  if (_SURF_VOL.master === 0 || _SURF_VOL.sfx === 0) return;
  try {
    const c = _SURF_SFX[key].cloneNode();
    c.volume = Math.min(1, Math.max(0, vol * _SURF_VOL.master * _SURF_VOL.sfx));
    c.play().catch(() => {});
  } catch(_) {}
}

// Enemy-type attack sound with fallback to generic enemy_hurt
function sfxEnemyAtk(enemyType) {
  const map = { crawler:'crawler_atk', lurker:'lurker_atk', watcher:'watcher_atk' };
  const key = map[enemyType] || 'enemy_hurt';
  if (_SURF_SFX[key]) sfx(key, 0.85);
  else sfx('enemy_hurt', 0.75);
}

// ── Ambient field loop ───────────────────────────────────────────────────────
let _ambientEl = null;
function startAmbient() {
  if (_ambientEl || !_SURF_SFX['ambient_field']) return;
  try {
    _ambientEl = _SURF_SFX['ambient_field'].cloneNode();
    _ambientEl.loop   = true;
    _ambientEl.volume = Math.min(1, _SURF_VOL.master * _SURF_VOL.ambient);
    _ambientEl.play().catch(() => {});
  } catch(_) {}
}
function stopAmbient() {
  if (!_ambientEl) return;
  try { _ambientEl.pause(); _ambientEl.currentTime = 0; } catch(_) {}
  _ambientEl = null;
}
// Duck ambient during combat, restore after
function _ambientDuck(on) {
  if (!_ambientEl) return;
  try {
    _ambientEl.volume = on
      ? Math.min(1, _SURF_VOL.master * _SURF_VOL.ambient * 0.25)
      : Math.min(1, _SURF_VOL.master * _SURF_VOL.ambient);
  } catch(_) {}
}

// Tile IDs that use stone sound: cobble(2), floor(9), door(10), cliff(15)
const STONE_TILES = new Set([2, 9, 10, 15]);
let _stepTimer = 0;
const STEP_INTERVAL = 0.32; // seconds between steps at full speed

function _tickFootsteps(dt, moving) {
  if (!moving) { _stepTimer = 0; return; }
  _stepTimer += dt;
  if (_stepTimer >= STEP_INTERVAL) {
    _stepTimer = 0;
    const tx = Math.floor(S.px / TILE_SIZE);
    const ty = Math.floor(S.py / TILE_SIZE);
    const tile = MAP_TILES[ty * MAP_W + tx] ?? 0;
    const key  = STONE_TILES.has(tile) ? 'footstep_stone' : 'footstep_dirt';
    sfx(key, 0.35 + Math.random() * 0.15);
  }
}

// ── sessionStorage handshake — receive from index.html ────────────────────
function loadEntryData() {

    const raw = sessionStorage.getItem('fentheris_surface_entry');

    const d = JSON.parse(raw);
    S.day          = d.day        || 1;
    S.totalHours   = d.totalHours || 0;
    S.hoursAwake   = d.hoursAwake || 0;
    S.gold=d.gold||0;
    S.sessionStartHours=S.totalHours;
    if(d.captain){
      const c=d.captain;S.captain={...S.captain,...c};
      if(c.melee)S.captain.melee=c.melee;
      if(c.ranged)S.captain.ranged=c.ranged;

      if(c.helmet)S.captain.helmet=c.helmet;
      if(c.inv)S.captain.inv=c.inv;
    }
    sessionStorage.removeItem('fentheris_surface_entry');
  } catch(e) {}

    hoursSpent:  Math.round(hoursSpent * 100) / 100,
    hoursAwake:  S.hoursAwake + hoursSpent,

// ── Surface rest ──────────────────────────────────────────────────────────
function surfaceRest() {

  const prevMidnights = Math.floor((S.totalHours - 8 + 6) / 24);
  const newMidnights  = Math.floor((S.totalHours + 6) / 24);

// ── Tile helpers ──────────────────────────────────────────────────────────
function getTile(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) return T.CLIFF;
  return MAP_TILES[ty * MAP_W + tx];
}

function isWalkable(tx, ty) {
  return !IMPASSABLE.has(getTile(tx, ty));
}

// ── Player movement ───────────────────────────────────────────────────────
function tryMove(dx, dy, dt) {
  dt = dt || (1/60);
  const nextPx = S.px + dx * TILE_SIZE * WALK_SPEED * dt;
  const nextPy = S.py + dy * TILE_SIZE * WALK_SPEED * dt;

  // Tile the player centre will land in (with small margin so player fits between tiles)
  const margin = TILE_SIZE * 0.4;
  const canMoveX = isWalkable(Math.floor((nextPx + margin * dx) / TILE_SIZE), Math.floor(S.py / TILE_SIZE))
                && isWalkable(Math.floor((nextPx + margin * dx) / TILE_SIZE), Math.floor((S.py + TILE_SIZE * 0.5) / TILE_SIZE));
  const canMoveY = isWalkable(Math.floor(S.px / TILE_SIZE), Math.floor((nextPy + margin * dy) / TILE_SIZE))
                && isWalkable(Math.floor((S.px + TILE_SIZE * 0.5) / TILE_SIZE), Math.floor((nextPy + margin * dy) / TILE_SIZE));

  if (dx !== 0 && canMoveX) S.px = Math.max(0, Math.min((MAP_W - 1) * TILE_SIZE, nextPx));
  if (dy !== 0 && canMoveY) S.py = Math.max(0, Math.min((MAP_H - 1) * TILE_SIZE, nextPy));

  if (dx !== 0 || dy !== 0) {
    S.dir=Math.abs(dx)>=Math.abs(dy)?(dx<0?'left':'right'):(dy<0?'up':'down');
    S.moving = true;
  }

  // Check exit zone
  const tx = Math.floor(S.px / TILE_SIZE);
  const ty = Math.floor(S.py / TILE_SIZE);
  if (ty <= EXIT_ZONE.maxTy) {
    setStatus('⛵ You feel the pull of the void above. Press Return to Ship to ascend.');
  }
  if(!S.combat.active){
    const hit=S.enemies.findIndex(e=>e.alive&&e.tx===tx&&e.ty===ty);
    if(hit>=0)startCombat(hit);
  }
}

// ── NPC interaction ───────────────────────────────────────────────────────
function tryInteract(){
  if(S.interactCooldown>0)return;
  const tx=Math.floor(S.px/TILE_SIZE),ty=Math.floor(S.py/TILE_SIZE);
  const fdx=S.dir==='left'?-1:S.dir==='right'?1:0;
  const fdy=S.dir==='up'  ?-1:S.dir==='down' ?1:0;
  const cands=[[tx+fdx,ty+fdy],[tx,ty-1],[tx,ty+1],[tx-1,ty],[tx+1,ty]];
  for(const[cx,cy]of cands){
    const npc=NPCS.find(n=>n.tx===cx&&n.ty===cy);
    if(npc){
      sfx('npc_interact',0.55);
      if(npc.merchant){openSurfShop(npc);}else{openDlg(npc);}
      S.interactCooldown=30;return;
    }
  }
}

function openDlg(npc) {
  S.dlgNpcId = npc.id;
  S.dlgLine  = 0;
  document.getElementById('dlg-name').textContent = npc.name;
  document.getElementById('dlg-text').textContent = npc.lines[0];
  document.getElementById('dialogue-box').style.display = 'block';
}

function advanceDlg() {
  if (!S.dlgNpcId) return;
  const npc = NPCS.find(n => n.id === S.dlgNpcId);

  S.dlgLine++;
  if (S.dlgLine >= npc.lines.length) {
    closeDlg();

  }
}

function closeDlg() {
  S.dlgNpcId = null;

}

// ── Camera ────────────────────────────────────────────────────────────────
function updateCamera(cW, cH) {
  const targetX = S.px - cW / 2;
  const targetY = S.py - cH / 2;
  const maxX = MAP_W * TILE_SIZE - cW;
  const maxY = MAP_H * TILE_SIZE - cH;
  S.cameraX = Math.max(0, Math.min(maxX, targetX));
  S.cameraY = Math.max(0, Math.min(maxY, targetY));
}

// ── HUD update ────────────────────────────────────────────────────────────
function updateHUD() {
  const h   = S.totalHours + S.sessionT * SURFACE_HOURS_PER_SEC;
  const hour = Math.floor((6 + h) % 24);
  const min  = Math.floor((h % 1) * 60);

    `Day ${S.day} — ${String(hour).padStart(2,'0')}:${String(min).padStart(2,'0')}`;

  const aw = S.hoursAwake + S.sessionT * SURFACE_HOURS_PER_SEC;
  const lvl = aw >= 24 ? 3 : aw >= 16 ? 2 : aw >= 8 ? 1 : 0;

}

function setStatus(text) {

// ── Procedural tile fallback (when tileset.png not loaded) ────────────────
const TILE_COLORS = [
  '#3a5a2a','#7a5a3a','#888899','#2a4a1a', // grass,dirt,stone,tgrass
  '#1a3a0a','#2a4a1a','#1a2a6a','#c8b060', // tree_t,tree_b,water,sand
  '#666677','#bbaa99','#886644','#aa8860', // wall,floor,door,wood
  '#555566','#444455','#4a7a3a','#444455', // rock,cave,flower,cliff
];

function drawTileFallback(ctx, tileId, dx, dy) {
  ctx.fillStyle = TILE_COLORS[tileId] || '#222';
  ctx.fillRect(dx, dy, TILE_SIZE, TILE_SIZE);
  // Grid lines
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(dx, dy, TILE_SIZE, TILE_SIZE);
}

// ── Render ────────────────────────────────────────────────────────────────
function render(ctx, cW, cH) {
  ctx.clearRect(0, 0, cW, cH);

  // Background
  ctx.fillStyle = '#0a0806';
  ctx.fillRect(0, 0, cW, cH);

  const tileSet  = IMGS['tileset'];
  const camOffX  = -S.cameraX;
  const camOffY  = -S.cameraY;

  // ── Draw tiles ──
  const startTx = Math.floor(S.cameraX / TILE_SIZE);
  const startTy = Math.floor(S.cameraY / TILE_SIZE);
  const endTx   = Math.min(MAP_W, startTx + Math.ceil(cW / TILE_SIZE) + 2);
  const endTy   = Math.min(MAP_H, startTy + Math.ceil(cH / TILE_SIZE) + 2);

  for (let ty = startTy; ty < endTy; ty++) {
    for (let tx = startTx; tx < endTx; tx++) {
      const tileId = getTile(tx, ty);
      const dx = tx * TILE_SIZE + camOffX;
      const dy = ty * TILE_SIZE + camOffY;
      if (tileSet?.complete && tileSet.naturalWidth > 0) {
        const [uc, ur] = TILE_UV[tileId] || [0,0];
        ctx.drawImage(tileSet,
          uc * TILE_SIZE, ur * TILE_SIZE, TILE_SIZE, TILE_SIZE,
          dx, dy, TILE_SIZE, TILE_SIZE);
      } else {
        drawTileFallback(ctx, tileId, dx, dy);
      }
    }
  }

  // ── Draw NPCs ──
  NPCS.forEach(npc => {
    const dx = npc.tx * TILE_SIZE + camOffX;
    const dy = npc.ty * TILE_SIZE + camOffY;
    if (dx < -TILE_SIZE || dy < -TILE_SIZE || dx > cW + TILE_SIZE || dy > cH + TILE_SIZE) return;
    const npcImg = IMGS[npc.img];
    const row = DIR_ROW[npc.dir] || 0;
    if (npcImg?.complete && npcImg.naturalWidth > 0) {
      ctx.drawImage(npcImg,
        0, row * FRAME_H, FRAME_W, FRAME_H,
        dx, dy, TILE_SIZE, TILE_SIZE);
    } else {
      ctx.fillStyle = '#4488ff';
      ctx.fillRect(dx + 8, dy + 8, 16, 16);
    }
    // Interaction prompt when adjacent
    const ptx = Math.floor(S.px / TILE_SIZE), pty = Math.floor(S.py / TILE_SIZE);
    const dist = Math.abs(ptx - npc.tx) + Math.abs(pty - npc.ty);
    if (dist <= 1) {
      ctx.fillStyle = '#e8c87a';
      ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('✦', dx + TILE_SIZE/2, dy - 4);
    }
  });

  // -- Draw enemies
  (S.enemies||[]).forEach(e=>{
    if(!e.alive)return;
    const edx=e.tx*TILE_SIZE+camOffX,edy=e.ty*TILE_SIZE+camOffY;
    if(edx<-TILE_SIZE||edy<-TILE_SIZE||edx>cW+TILE_SIZE||edy>cH+TILE_SIZE)return;
    ctx.fillStyle=e.color||'rgba(100,20,40,0.7)';ctx.globalAlpha=0.8;
    ctx.fillRect(edx+3,edy+3,TILE_SIZE-6,TILE_SIZE-6);ctx.globalAlpha=1;
    ctx.font='13px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.fillText(e.emoji||'?',edx+TILE_SIZE/2,edy+TILE_SIZE/2);
    ctx.textBaseline='alphabetic';
    const hpF=Math.max(0,e.currentHp/e.hp);
    ctx.fillStyle='#220000';ctx.fillRect(edx+2,edy-5,TILE_SIZE-4,3);
    ctx.fillStyle=hpF>.5?'#44cc44':hpF>.25?'#ccaa00':'#cc3333';
    ctx.fillRect(edx+2,edy-5,(TILE_SIZE-4)*hpF,3);
  });

  // ── Draw player ──
  const pdx = S.px + camOffX - TILE_SIZE * 0.5;
  const pdy = S.py + camOffY - TILE_SIZE * 0.5;
  const playerImg = IMGS['player'];
  const pRow = DIR_ROW[S.dir] || 0;
  const pCol = S.moving ? S.animFrame : 0;

  if (playerImg?.complete && playerImg.naturalWidth > 0) {
    ctx.drawImage(playerImg,
      pCol * FRAME_W, pRow * FRAME_H, FRAME_W, FRAME_H,
      pdx, pdy, TILE_SIZE, TILE_SIZE);
  } else {
    // Procedural player fallback — simple coloured rectangle
    ctx.fillStyle = '#44aaff';
    ctx.fillRect(pdx + 8, pdy + 4, 16, 22);
    ctx.fillStyle = '#ffcc88';
    ctx.fillRect(pdx + 10, pdy, 12, 12); // head
    // Direction indicator
    ctx.fillStyle = '#ffffff';
    const arrowDx = S.dir === 'left' ? -4 : S.dir === 'right' ? 4 : 0;
    const arrowDy = S.dir === 'up' ? -4 : S.dir === 'down' ? 4 : 0;
    ctx.fillRect(pdx + 16 + arrowDx, pdy + 12 + arrowDy, 3, 3);
  }

  // ── Exit zone hint ──
  const playerTy = Math.floor(S.py / TILE_SIZE);
  if (playerTy <= 2) {
    ctx.fillStyle = 'rgba(180,140,60,0.75)';
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('[ Return to Ship ]', cW / 2, cH - 24);
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────
let animId = null;

function loop(timestamp) {
  animId = requestAnimationFrame(loop);

  const dt = S.lastTimestamp ? Math.min((timestamp - S.lastTimestamp) / 1000, 0.1) : 0.016;
  S.lastTimestamp = timestamp;
  S.sessionT += dt;
  if (S.interactCooldown > 0) S.interactCooldown--;

  // ── Input ──
  S.moving = false;
  const shopOpen=document.getElementById('surf-shop')?.style.display==='flex';
  const dlgOpen=document.getElementById('dialogue-box').style.display==='block';

  if(!dlgOpen&&!S.combat.active&&!shopOpen&&!_surfAnyOvlOpen()){
    let dx = 0, dy = 0;
    if(S.keys.left)dx-=1;if(S.keys.right)dx+=1;
    if(S.keys.up)dy-=1;if(S.keys.down)dy+=1;
    if(S.joystickActive){dx+=S.joystickX;dy+=S.joystickY;}
    const _mag=Math.sqrt(dx*dx+dy*dy);if(_mag>1){dx/=_mag;dy/=_mag;}
    const _moving=(dx!==0||dy!==0);
    if(_moving)tryMove(dx,dy,dt);
    _tickFootsteps(dt,_moving);
  }

  // ── Sprite animation ──
  if (S.moving) {
    S.animTimer += dt;
    if (S.animTimer >= 1 / ANIM_FPS) {
      S.animTimer = 0;
      S.animFrame = (S.animFrame + 1) % FRAME_COLS;
    }
  } else {
    S.animFrame  = 0;
    S.animTimer  = 0;
  }

  // ── Canvas sizing ──
  const cv = document.getElementById('surface-canvas');
  const cW = cv.clientWidth, cH = cv.clientHeight;
  if (cv.width !== cW || cv.height !== cH) { cv.width = cW; cv.height = cH; }

  updateCamera(cW, cH);
  updateHUD();

  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = false; // keep pixels sharp
  render(ctx, cW, cH);
}

// -- Joystick
(function(){
  const zone=document.getElementById('surf-joy-zone');
  const knob=document.getElementById('surf-joy-knob');
  if(!zone||!knob)return;
  if('ontouchstart'in window||navigator.maxTouchPoints>0){
    zone.style.display='block';
    const ab=document.getElementById('surf-act-btn');if(ab)ab.style.display='flex';
  }
  const R=34;let _a=false,ox=0,oy=0;
  zone.addEventListener('touchstart',e=>{
    e.preventDefault();_a=true;S.joystickActive=true;
    const r=zone.getBoundingClientRect();ox=r.left+r.width/2;oy=r.top+r.height/2;
    _mv(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:false});
  zone.addEventListener('touchmove',e=>{e.preventDefault();if(_a)_mv(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  zone.addEventListener('touchend',_rel);zone.addEventListener('touchcancel',_rel);
  function _rel(){_a=false;S.joystickActive=false;S.joystickX=0;S.joystickY=0;knob.style.transform='translate(-50%,-50%)';}
  function _mv(cx,cy){
    let dx=cx-ox,dy=cy-oy,d=Math.sqrt(dx*dx+dy*dy);
    if(d>R){dx*=R/d;dy*=R/d;}
    knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
    S.joystickX=dx/R;S.joystickY=dy/R;
  }
})();
(function(){
  const btn=document.getElementById('surf-act-btn');if(!btn)return;
  btn.addEventListener('touchstart',e=>{e.preventDefault();tryInteract();},{passive:false});
  btn.addEventListener('mousedown',e=>{e.preventDefault();tryInteract();});
})();
document.addEventListener('touchend',()=>{S.keys.up=false;S.keys.down=false;S.keys.left=false;S.keys.right=false;});
document.addEventListener('touchcancel',()=>{S.keys.up=false;S.keys.down=false;S.keys.left=false;S.keys.right=false;});
document.addEventListener('mouseup',()=>{S.keys.up=false;S.keys.down=false;S.keys.left=false;S.keys.right=false;});

// COMBAT SCENE RENDERER  v2  (BoF3-style side view)

// ── Combat sprite sheet helpers ────────────────────────────────────────────
// Frame size for all combat sheets: 64×64 px.
// Draws one frame anchored at bottom-centre (x,y = feet on ground).
// Returns true if the image was available and drawn; false = use procedural.
const CBT_FRAME_W = 64, CBT_FRAME_H = 64;
const CBT_SCALE   = 1.5;  // render size: 96×96 screen pixels

function _cbtFrame(ctx, key, row, col, x, y) {
  const img = IMGS[key];
  if (!img || !img.complete || img.naturalWidth === 0) return false;
  // Derive actual frame size from sheet — always 4 columns wide.
  // This handles any upload resolution (256, 512, etc.) automatically.
  const srcW = Math.floor(img.naturalWidth  / 4);
  const srcH = Math.floor(img.naturalHeight / 4);
  const dw = CBT_FRAME_W * CBT_SCALE;  // always render at 96px wide
  const dh = CBT_FRAME_H * CBT_SCALE;  // always render at 96px tall
  ctx.drawImage(img,
    col * srcW, row * srcH, srcW, srcH,
    Math.floor(x - dw / 2), Math.floor(y - dh), dw, dh);
  return true;
}

// Row/col selector for the captain sprite sheet
// Row 0 = Idle, Row 1 = Melee, Row 2 = Ranged, Row 3 = Hurt/Victory
function _capRowCol() {
  const a = _cbtA;
  // Hurt (hit flash)
  if (a.capFlash > 0.05) return [3, a.capFlash > 0.2 ? 0 : 1];
  // Victory
  if (S.combat.ended && S.combat.enemy && !S.combat.enemy.alive)
    return [3, Math.floor(a.t * 4) % 2 + 2];
  // Ranged attack
  if (a.atkPhase === 'rng' || a.atkPhase === 'rng-done') {
    const col = a.atkPhase === 'rng'
      ? (a.atkT < 0.05 ? 0 : a.atkT < 0.10 ? 1 : a.atkT < 0.14 ? 2 : 3) : 3;
    return [2, col];
  }
  // Melee attack
  if (a.atkPhase === 'ml-out') return [1, a.atkT < 0.11 ? 0 : 1];
  if (a.atkPhase === 'ml-hold') return [1, 2];
  if (a.atkPhase === 'ml-in')   return [1, 3];
  // Idle cycle
  return [0, Math.floor(a.t * 4) % 4];
}

// Row/col selector for enemy sprite sheets
// Row 0 = Idle, Row 1 = Attack, Row 2 = Hit(0-1) / Death(2-3)
function _enmRowCol(enemy) {
  const a = _cbtA;
  if (!enemy || !enemy.alive) {
    // Death: hold frame 2 briefly, then 3
    return [2, a.t > 0.4 ? 3 : 2];
  }
  // Hit flash
  if (a.enmFlash > 0.05) return [2, a.enmFlash > 0.2 ? 0 : 1];
  // Attack animation
  if (a.atkPhase === 'enm-out') return [1, a.atkT < 0.07 ? 0 : 1];
  if (a.atkPhase === 'enm-in')  return [1, a.atkT < 0.09 ? 2 : 3];
  // Idle cycle
  return [0, Math.floor(a.t * 4) % 4];
}

let _cbtAnimId = null;
let _cbtLastTs = 0;
let _cbtA = {          // animation state
  t:0,
  capOffX:0, enmOffX:0,
  capFlash:0, enmFlash:0,
  atkPhase:null, atkT:0,   // attack animation phase
  dmgNums:[],              // [{x,y,val,t,col}]
  initT:0,                 // initiative countdown (seconds)
  initLines:[],
  menuCat:'attack', menuFocus:0,
  btnsOn:false,
};

function _cbtStartScene() {
  if (_cbtAnimId) return;
  const cv = document.getElementById('sc-scene');
  if (!cv) return;
  cv.width  = cv.clientWidth  || 360;
  cv.height = Math.min(Math.floor(cv.clientWidth * 0.48), 220);
  _cbtAnimId = requestAnimationFrame(_cbtSceneLoop);
}
function _cbtStopScene() {
  if (_cbtAnimId) { cancelAnimationFrame(_cbtAnimId); _cbtAnimId = null; }
}

function _cbtSceneLoop(ts) {
  _cbtAnimId = requestAnimationFrame(_cbtSceneLoop);
  const dt = Math.min((ts - (_cbtLastTs || ts)) / 1000, 0.05);
  _cbtLastTs = ts;
  _cbtA.t += dt;
  // ─ Attack animation phases ─
  if (_cbtA.atkPhase) {
    _cbtA.atkT += dt;
    const T = _cbtA.atkT;
    if (_cbtA.atkPhase === 'ml-out') {
      _cbtA.capOffX = Math.min(T / 0.22, 1) * 52;
      if (T >= 0.22) { _cbtA.enmFlash = 0.35; _cbtA.atkPhase = 'ml-hold'; }
    } else if (_cbtA.atkPhase === 'ml-hold') {
      if (T >= 0.12) { _cbtA.atkPhase = 'ml-in'; _cbtA.atkT = 0; }
    } else if (_cbtA.atkPhase === 'ml-in') {
      _cbtA.capOffX = 52 * (1 - Math.min(T / 0.18, 1));
      if (T >= 0.18) { _cbtA.capOffX = 0; _cbtA.atkPhase = null; }
    } else if (_cbtA.atkPhase === 'rng') {
      if (T >= 0.16) { _cbtA.enmFlash = 0.32; _cbtA.atkPhase = 'rng-done'; }
    } else if (_cbtA.atkPhase === 'rng-done') {
      if (T >= 0.38) _cbtA.atkPhase = null;
    } else if (_cbtA.atkPhase === 'enm-out') {
      _cbtA.enmOffX = -Math.min(T / 0.14, 1) * 28;
      if (T >= 0.14) { _cbtA.capFlash = 0.38; _cbtA.atkPhase = 'enm-in'; _cbtA.atkT = 0; }
    } else if (_cbtA.atkPhase === 'enm-in') {
      _cbtA.enmOffX = -28 * (1 - Math.min(T / 0.18, 1));
      if (T >= 0.18) { _cbtA.enmOffX = 0; _cbtA.atkPhase = null; }
    }
  }
  if (_cbtA.capFlash > 0) _cbtA.capFlash = Math.max(0, _cbtA.capFlash - dt * 2.8);
  if (_cbtA.enmFlash > 0) _cbtA.enmFlash = Math.max(0, _cbtA.enmFlash - dt * 2.8);
  _cbtA.dmgNums.forEach(n => { n.t -= dt; n.y -= 30 * dt; });
  _cbtA.dmgNums = _cbtA.dmgNums.filter(n => n.t > 0);
  if (_cbtA.initT > 0) _cbtA.initT -= dt;
  _cbtDrawScene();
}

function _cbtDrawScene() {
  const cv = document.getElementById('sc-scene'); if (!cv) return;
  const W = cv.width, H = cv.height;
  const ctx = cv.getContext('2d');

  // ─ Background ─
  const bg = ctx.createLinearGradient(0,0,W,0);
  bg.addColorStop(0,'#08031a'); bg.addColorStop(0.5,'#050210'); bg.addColorStop(1,'#120308');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // Ground
  const GY = Math.floor(H * 0.74);
  const grd = ctx.createLinearGradient(0,GY,0,H);
  grd.addColorStop(0,'rgba(55,25,8,0.65)'); grd.addColorStop(1,'rgba(18,8,3,0.92)');
  ctx.fillStyle = grd; ctx.fillRect(0,GY,W,H-GY);
  ctx.strokeStyle='rgba(110,60,18,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(W,GY); ctx.stroke();

  // Subtle void particles
  ctx.fillStyle='rgba(100,60,180,0.1)';
  for (let i=0;i<5;i++) {
    const px=((i*139+_cbtA.t*7)%W), py=(i*61+Math.sin(_cbtA.t*0.5+i)*12)%(GY-10)+5;
    ctx.beginPath(); ctx.arc(px,py,1.2,0,Math.PI*2); ctx.fill();
  }

  // HP bars
  const cap=S.captain, e=S.combat.enemy;
  _hpBar(ctx,10,8,Math.floor(W*0.4),9,cap.hp/cap.maxHp,'#cc3333','Captain Lv'+cap.level,cap.hp+'/'+cap.maxHp);
  if (e) _hpBar(ctx,W-10-Math.floor(W*0.4),8,Math.floor(W*0.4),9,Math.max(0,e.currentHp/e.hp),'#3355aa',e.name,e.currentHp+'/'+e.hp,'right');

  // Character positions
  const capX = Math.floor(W*0.20) + _cbtA.capOffX;
  const enmX = Math.floor(W*0.78) + _cbtA.enmOffX;

  // Ranged bullet
  if (_cbtA.atkPhase==='rng' && e) {
    const p=Math.min(_cbtA.atkT/0.16,1);
    const bx=capX+(enmX-capX)*p, by=GY-Math.floor(H*0.22);
    ctx.fillStyle='#ffee88';
    ctx.beginPath(); ctx.arc(bx,by,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,230,80,0.25)';
    ctx.beginPath(); ctx.arc(bx,by,5,0,Math.PI*2); ctx.fill();
  }

  // Draw captain and enemy
  _drawCaptain(ctx,capX,GY,_cbtA.t,_cbtA.capFlash);
  if (e) _drawEnemy(ctx,enmX,GY,_cbtA.t,_cbtA.enmFlash,e);

  // Damage numbers
  _cbtA.dmgNums.forEach(n=>{
    ctx.globalAlpha=Math.min(n.t/0.25,1);
    ctx.fillStyle=n.col; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
    ctx.fillText(n.val,n.x,n.y); ctx.globalAlpha=1;
  });

  // Initiative overlay
  if (_cbtA.initT>0) {
    const fi=Math.min((3-_cbtA.initT)/0.3,1);
    const fo=_cbtA.initT<0.5?_cbtA.initT/0.5:1;
    const al=Math.min(fi,fo)*0.9;
    ctx.fillStyle='rgba(2,1,8,'+al+')'; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=Math.min(fi,fo);
    ctx.textAlign='center';
    ctx.fillStyle='#e8c87a'; ctx.font='bold 12px Georgia';
    ctx.fillText('INITIATIVE ROLL',W/2,H/2-38);
    _cbtA.initLines.forEach((ln,i)=>{
      ctx.fillStyle=i<2?'#c8a880':(ln.includes('YOU')?'#88ee88':'#ee7755');
      ctx.font=(i===2?'bold ':'')+'10px Courier New';
      ctx.fillText(ln,W/2,H/2-16+i*18);
    });
    ctx.globalAlpha=1;
  }
}

function _hpBar(ctx,x,y,w,h,pct,col,label,val,align) {
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(x,y,w,h);
  ctx.fillStyle=pct>0.5?col:pct>0.25?'#cc8800':'#cc2222';
  ctx.fillRect(x,y,w*Math.max(0,pct),h);
  ctx.strokeStyle='rgba(160,120,40,0.2)'; ctx.lineWidth=0.5; ctx.strokeRect(x,y,w,h);
  ctx.fillStyle='rgba(210,180,130,0.75)'; ctx.font='8px Courier New';
  ctx.textAlign=align==='right'?'right':'left';
  ctx.fillText(label,align==='right'?x+w:x,y-2);
  ctx.textAlign=align==='right'?'left':'right';
  ctx.fillText(val,align==='right'?x:x+w,y-2);
}

// ─ Captain sprite (side-view, facing right) ─
function _drawCaptain(ctx,x,y,t,flash) {
  // Sprite sheet (if loaded)
  const [_cr,_cc]=_capRowCol();
  if (_cbtFrame(ctx,'cbt_captain',_cr,_cc,x,y)) return;
  // Procedural fallback
  const bob=Math.sin(t*2.6)*1.4;
  ctx.save(); ctx.translate(Math.floor(x),Math.floor(y+bob));
  const fl=flash>0.05, F='#ffffff';
  const skin=fl?F:'#dda870', suit=fl?F:'#2d3f5a', trim=fl?F:'#4466aa',
        boot=fl?F:'#1e2f3f', wep=fl?F:'#7a8fa0', gun=fl?F:'#5a6e7a';

  // Legs
  ctx.fillStyle=boot;
  ctx.fillRect(-6,-16,5,16); ctx.fillRect(2,-16,5,16);
  // Boot toes
  ctx.fillRect(-8,-4,7,4); ctx.fillRect(1,-4,7,4);
  // Torso
  ctx.fillStyle=suit; ctx.fillRect(-8,-34,16,18);
  // Chest stripe
  ctx.fillStyle=trim; ctx.fillRect(-2,-32,2,14);
  // Left arm
  ctx.fillStyle=suit; ctx.fillRect(-12,-32,4,14);
  // Right arm + weapon
  ctx.fillStyle=suit; ctx.fillRect(8,-32,4,12);
  const useGun=S.captain.ranged&&S.combat.shotsLeft>0;
  if (useGun) {
    ctx.fillStyle=gun;
    ctx.fillRect(11,-27,10,5); // barrel
    ctx.fillRect(12,-23,5,6); // grip
    // Muzzle flash if firing
    if (S.combat&&_cbtA.atkPhase==='rng'&&_cbtA.atkT<0.08) {
      ctx.fillStyle='#ffee55'; ctx.beginPath(); ctx.arc(22,-24,4,0,Math.PI*2); ctx.fill();
    }
  } else if (S.captain.melee) {
    ctx.fillStyle=wep; ctx.fillRect(11,-30,10,2);
    ctx.fillStyle='#aa7733'; ctx.fillRect(10,-28,4,3);
  }
  // Head
  ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(0,-40,8,0,Math.PI*2); ctx.fill();
  // Helmet
  ctx.fillStyle=fl?F:'#1e3050'; ctx.fillRect(-6,-44,12,6);
  ctx.fillStyle=fl?'#aaaaff':'#2a4a88'; ctx.fillRect(-4,-44,8,4);
  // Visor glow
  if (!fl) { ctx.fillStyle='rgba(80,120,220,0.3)'; ctx.fillRect(-4,-44,8,4); }

  ctx.restore();
}

// ─ Enemy dispatch ─
function _drawEnemy(ctx,x,y,t,flash,e) {
  const type=(e.type||'').toLowerCase();
  if (type==='crawler'||e.name.includes('Crawler')) _drawCrawler(ctx,x,y,t,flash);
  else if (type==='lurker'||e.name.includes('Lurker')) _drawLurker(ctx,x,y,t,flash);
  else _drawWatcher(ctx,x,y,t,flash);
}

function _drawCrawler(ctx,x,y,t,fl) {
  const [_er,_ec]=_enmRowCol(S.combat.enemy);
  if (_cbtFrame(ctx,'cbt_crawler',_er,_ec,x,y)) return;
  const bob=Math.sin(t*3.5)*2.2;
  ctx.save(); ctx.translate(Math.floor(x),Math.floor(y+bob));
  const hit=fl>0.05, c1=hit?'#fff':'#882244', c2=hit?'#ffaaaa':'#551133';

  // 6 legs
  ctx.strokeStyle=c2; ctx.lineWidth=2;
  for (let i=0;i<3;i++) {
    const a=(i/3)*Math.PI*0.85-0.4;
    const wa=Math.sin(t*4+i)*0.18;
    ctx.beginPath(); ctx.moveTo(-10,-10);
    ctx.lineTo(-10-Math.cos(a+wa)*22,-10+Math.abs(Math.sin(a+wa))*14+4);
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,-10);
    ctx.lineTo(10+Math.cos(a-wa)*22,-10+Math.abs(Math.sin(a-wa))*14+4);
    ctx.stroke();
  }
  // Body
  ctx.fillStyle=c1;
  ctx.beginPath(); ctx.ellipse(0,-16,16,11,0,0,Math.PI*2); ctx.fill();
  // Abdomen
  ctx.fillStyle=c2;
  ctx.beginPath(); ctx.ellipse(0,-6,10,7,0,0,Math.PI*2); ctx.fill();
  // Eyes
  if (!hit) {
    ctx.fillStyle='#ff3333';
    ctx.beginPath(); ctx.arc(-6,-18,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,-18,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffaaaa';
    ctx.beginPath(); ctx.arc(-5.5,-18.5,1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6.5,-18.5,1,0,Math.PI*2); ctx.fill();
  }
  // Mandibles
  ctx.strokeStyle=hit?'#fff':'#660022'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-8,-8); ctx.lineTo(-14,-3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8,-8); ctx.lineTo(14,-3); ctx.stroke();
  ctx.restore();
}

function _drawLurker(ctx,x,y,t,fl) {
  const [_er,_ec]=_enmRowCol(S.combat.enemy);
  if (_cbtFrame(ctx,'cbt_lurker',_er,_ec,x,y)) return;
  const shk=fl>0.05?(Math.random()-0.5)*4:0;
  ctx.save(); ctx.translate(Math.floor(x+shk),Math.floor(y));
  const hit=fl>0.05, c1=hit?'#fff':'#6a7d8e', c2=hit?'#aac':'#3e5260', c3=hit?'#fff':'#2a3d4a';

  // Body - craggy boulder shape
  ctx.fillStyle=c1;
  ctx.beginPath();
  ctx.moveTo(-28,0);
  ctx.bezierCurveTo(-30,-22,-22,-44,0,-46);
  ctx.bezierCurveTo(22,-46,30,-24,28,0);
  ctx.closePath(); ctx.fill();

  // Texture cracks
  ctx.strokeStyle=c3; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-12,-12); ctx.lineTo(-5,-26); ctx.lineTo(2,-20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,-10); ctx.lineTo(16,-22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-6,-30); ctx.lineTo(4,-38); ctx.stroke();

  // Shadow belly
  ctx.fillStyle=c2;
  ctx.beginPath(); ctx.ellipse(0,-5,18,8,0,0,Math.PI); ctx.fill();

  // Eyes
  if (!hit) {
    const ep=0.8+Math.sin(t*2.2)*0.2;
    const drawEye=(ex,ey)=>{
      ctx.fillStyle='#ff8800'; ctx.beginPath(); ctx.arc(ex,ey,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffcc44'; ctx.beginPath(); ctx.arc(ex,ey,3.5*ep,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#331100'; ctx.beginPath(); ctx.arc(ex,ey,1.5,0,Math.PI*2); ctx.fill();
      // Glow
      const gl=ctx.createRadialGradient(ex,ey,2,ex,ey,11);
      gl.addColorStop(0,'rgba(255,140,0,0.28)'); gl.addColorStop(1,'rgba(255,140,0,0)');
      ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(ex,ey,11,0,Math.PI*2); ctx.fill();
    };
    drawEye(-10,-26); drawEye(10,-26);
  }
  ctx.restore();
}

function _drawWatcher(ctx,x,y,t,fl) {
  const [_er,_ec]=_enmRowCol(S.combat.enemy);
  if (_cbtFrame(ctx,'cbt_watcher',_er,_ec,x,y)) return;
  const sway=Math.sin(t*1.9)*3;
  ctx.save(); ctx.translate(Math.floor(x+sway),Math.floor(y));
  const hit=fl>0.05, c1=hit?'#fff':'#6a3380', c2=hit?'#ddaaff':'#3d1a55';

  // Spindly legs
  ctx.strokeStyle=hit?'#fff':'#4a2060'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(-18,-14); ctx.lineTo(-20,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,0); ctx.lineTo(18,-14); ctx.lineTo(20,0); ctx.stroke();

  // Body
  ctx.fillStyle=c1;
  ctx.beginPath();
  ctx.moveTo(-9,0); ctx.lineTo(-7,-52); ctx.lineTo(7,-52); ctx.lineTo(9,0);
  ctx.closePath(); ctx.fill();

  // Ribbing detail
  if (!hit) {
    ctx.strokeStyle='rgba(80,30,100,0.6)'; ctx.lineWidth=1;
    for (let i=1;i<4;i++) {
      const ry=-12*i;
      ctx.beginPath(); ctx.moveTo(-7,ry); ctx.lineTo(7,ry); ctx.stroke();
    }
  }

  // Tentacle arms
  ctx.strokeStyle=hit?'#fff':'#4a2060'; ctx.lineWidth=4;
  const at=Math.sin(t*2.2)*9;
  ctx.beginPath(); ctx.moveTo(-7,-36);
  ctx.quadraticCurveTo(-28,-36+at,-24,-20+at*0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,-36);
  ctx.quadraticCurveTo(28,-36-at,24,-20-at*0.5); ctx.stroke();

  // Head
  ctx.fillStyle=c1;
  ctx.beginPath(); ctx.ellipse(0,-60,13,11,0,0,Math.PI*2); ctx.fill();

  // Central eye
  const ep=0.75+Math.sin(t*3.1)*0.25;
  if (!hit) {
    ctx.fillStyle='#bb44ee';
    ctx.beginPath(); ctx.ellipse(0,-60,9*ep,8*ep,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ee99ff';
    ctx.beginPath(); ctx.ellipse(0,-60,4*ep,4*ep,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#110011';
    ctx.beginPath(); ctx.arc(0,-60,2,0,Math.PI*2); ctx.fill();
    const eg=ctx.createRadialGradient(0,-60,3,0,-60,18);
    eg.addColorStop(0,'rgba(180,60,240,0.38)'); eg.addColorStop(1,'rgba(180,60,240,0)');
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(0,-60,18,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(0,-60,10,9,0,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

// ─ Damage number helper ─
function _cbtDmg(x,y,val,col) {
  _cbtA.dmgNums.push({x,y,val:String(val),t:0.9,col:col||'#dd8855'});
}

// ─ Initiative roll ─
function _cbtRollInit(enemy) {
  const capMod=Math.floor((S.captain.level-1)/4)+(S.captain.initiative||0);
  const enmMod=enemy.initiative||0;
  const cr=Math.floor(Math.random()*20)+1;
  const er=Math.floor(Math.random()*20)+1;
  const ct=cr+capMod, et=er+enmMod;
  const first=ct>=et;
  _cbtA.initT=3.2;
  _cbtA.initLines=[
    'Captain: d20('+cr+') + '+capMod+' = '+ct,
    'Enemy:   d20('+er+') + '+enmMod+' = '+et,
    first?'-- YOU GO FIRST --':'-- ENEMY STRIKES FIRST --',
  ];
  return {first,ct,et};
}

// ─ Menu ─
function cbtMenuCat(cat) {
  if (!_cbtA.btnsOn&&cat!=='dummy') return;
  _cbtA.menuCat=cat; _cbtA.menuFocus=0;
  document.querySelectorAll('.sc-cat').forEach(b=>b.classList.remove('active'));
  const cb=document.getElementById('sc-cat-'+cat);
  if (cb) cb.classList.add('active');
  _cbtBuildSub();
}

function _cbtBuildSub() {
  const sub=document.getElementById('sc-menu-sub'); if (!sub) return;
  sub.innerHTML='';
  if (_cbtA.menuCat==='attack') {
    const items=[];
    if (S.captain.melee)  items.push({label:'Combat Knife',hint:S.captain.melee.dmgMin+'-'+S.captain.melee.dmgMax+' dmg',fn:cbtMelee,dis:false});
    if (S.captain.ranged) {
      if (S.combat.shotsLeft > 0) {
        items.push({label:'Void Pistol',
          hint:S.captain.ranged.dmgMin+'-'+S.captain.ranged.dmgMax+' dmg | '+S.combat.shotsLeft+' shots',
          fn:cbtRanged, dis:false});
      } else {
        const _mags=S.captain.inv.filter(i=>i.id==='pistol_mag').reduce((s,i)=>s+(i.qty||1),0);
        items.push({label:_mags>0?'Reload Pistol':'Pistol Empty',
          hint:_mags>0?'uses 1 mag | '+_mags+' left':'buy ammo from Mira Voss',
          fn:_mags>0?cbtReload:()=>{}, dis:_mags<=0});
      }
    }
    items.forEach((it,i)=>{
      const b=document.createElement('button');
      b.className='sc-sub'+(i===_cbtA.menuFocus?' focused':'');
      b.innerHTML=it.label+'<span class="sc-sub-hint">'+it.hint+'</span>';
      b.disabled=it.dis||!_cbtA.btnsOn;
      b.onclick=it.fn; b.ontouchend=e=>{e.preventDefault();it.fn();};
      sub.appendChild(b);
    });
  } else if (_cbtA.menuCat==='item') {
    const potQty=S.captain.inv.filter(i=>i.id==='potion').reduce((s,i)=>s+(i.qty||1),0);
    if (potQty>0) {
      const b=document.createElement('button');
      b.className='sc-sub'+(0===_cbtA.menuFocus?' focused':'');
      b.innerHTML='Healing Tincture<span class="sc-sub-hint">+20 HP | '+potQty+' left</span>';
      b.disabled=!_cbtA.btnsOn;
      b.onclick=cbtPotion; b.ontouchend=e=>{e.preventDefault();cbtPotion();};
      sub.appendChild(b);
    } else {
      sub.innerHTML='<div style="padding:8px 14px;font-size:10px;color:#443322;font-style:italic;">No items</div>';
    }
  }
}

function _cbtSetBtns(on) {
  _cbtA.btnsOn=on;
  document.querySelectorAll('.sc-cat:not(.sc-cat-flee)').forEach(b=>{b.disabled=!on;});
  if (on) _cbtBuildSub();
  else document.querySelectorAll('.sc-sub').forEach(b=>{b.disabled=true;});
}

// ─ Keyboard nav ─
function _cbtKeyNav(e) {
  if (!S.combat.active||!_cbtA.btnsOn) return;
  const subs=[...document.querySelectorAll('.sc-sub:not(:disabled)')];
  const n=subs.length;
  if (e.key==='ArrowDown'||e.key==='s'||e.key==='S') {
    e.preventDefault(); _cbtA.menuFocus=(_cbtA.menuFocus+1)%Math.max(1,n); _cbtBuildSub();
  } else if (e.key==='ArrowUp'||e.key==='w'||e.key==='W') {
    e.preventDefault(); _cbtA.menuFocus=(_cbtA.menuFocus-1+Math.max(1,n))%Math.max(1,n); _cbtBuildSub();
  } else if (e.key==='Tab') {
    e.preventDefault(); cbtMenuCat(_cbtA.menuCat==='attack'?'item':'attack');
  } else if (e.key==='Enter'||e.key===' ') {
    e.preventDefault(); if (n>0) subs[Math.min(_cbtA.menuFocus,n-1)]?.click();
  }
}

function _rng(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// ── Starter gear ───────────────────────────────────────────────────────────
function initStarterGear() {
  if (S.captain.gearGiven) return;
  S.captain.maxHp   = 30 + (S.captain.armor.hpBonus||0) + (S.captain.helmet.hpBonus||0);
  S.captain.hp      = S.captain.maxHp;
  S.captain.defense = (S.captain.armor.def||0) + (S.captain.helmet.def||0);
  S.captain.inv.push({ id:'potion',     name:'Healing Tincture', type:'potion', qty:2, heal:20 });
  S.captain.inv.push({ id:'pistol_mag', name:'Pistol Magazine',  type:'ammo',   qty:2, shots:3 });
  S.captain.shotsLoaded = 3;
  S.captain.gearGiven = true;
  setStatus('Gear equipped: Leather Armor, Void Helmet, Combat Knife, Void Pistol, 2x Healing Tincture.');
}

// ── Enemy spawning ────────────────────────────────────────────────────────
function initEnemies() {
  S.enemies = ENEMY_SPAWNS.map((sp, i) => ({
    ...ENEMY_DEFS[sp.type],
    tx: sp.tx, ty: sp.ty,
    currentHp: ENEMY_DEFS[sp.type].hp,
    alive: true, spawnIdx: i, type: sp.type,
  }));
}

function respawnEnemies() {
  ENEMY_SPAWNS.forEach((sp, i) => {
    if (!S.enemies[i]?.alive) {
      S.enemies[i] = {
        ...ENEMY_DEFS[sp.type],
        tx: sp.tx, ty: sp.ty,
        currentHp: ENEMY_DEFS[sp.type].hp,
        alive: true, spawnIdx: i, type: sp.type,
      };
    }
  });
}

// ── Combat open/close ────────────────────────────────────────────────────
function startCombat(idx) {
  if (S.combat.active) return;
  const e = S.enemies[idx]; if (!e?.alive) return;
  S.combat.active=true; S.combat.enemy=e; S.combat.enemyIdx=idx;
  S.combat.log=[]; S.combat.playerTurn=true;
  S.combat.shotsLeft=S.captain.ranged.shotsPerCombat||3;
  S.combat.ended=false;
  // Reset animation
  Object.assign(_cbtA,{t:0,capOffX:0,enmOffX:0,capFlash:0,enmFlash:0,
    atkPhase:null,atkT:0,dmgNums:[],menuCat:'attack',menuFocus:0,btnsOn:false});
  // Show overlay + size canvas
  document.getElementById('surf-combat').style.display='flex';
  _ambientDuck(true);
  const cv=document.getElementById('sc-scene');
  if (cv){cv.width=cv.clientWidth||360;cv.height=Math.min(Math.floor(cv.clientWidth*0.48),220);}
  // Build disabled menu
  cbtMenuCat('dummy');
  _cbtBuildSub();
  // Start scene loop
  _cbtStartScene();
  // Initiative roll
  const init=_cbtRollInit(e);
  // After reveal delay, start combat proper
  setTimeout(()=>{
    _cbtA.initT=0;
    cbtLog('A '+e.name+' blocks your path!','warn');
    if (init.first) {
      cbtLog('You have initiative! Choose your action.','info');
      _cbtSetBtns(true);
    } else {
      cbtLog('The enemy moves first!','warn');
      setTimeout(_cbtEnemyTurn,600);
    }
  },3400);
}

function closeCombat() {
  S.captain.shotsLoaded = S.combat.shotsLeft;
  S.combat.active=false;
  _cbtStopScene();
  _ambientDuck(false);
  document.getElementById('surf-combat').style.display='none';
}

// ── UI ───────────────────────────────────────────────────────────────────────
function _renderCbt() {
  // Scene rendered by canvas loop; just update log
  const logEl=document.getElementById('sc-log'); if(!logEl) return;
  logEl.innerHTML=S.combat.log.slice(-12).map(l=>'<div class="sc-log-'+l.t+'">'+l.m+'</div>').join('');
  logEl.scrollTop=logEl.scrollHeight;
  _cbtBuildSub(); // refresh counts
}

function cbtLog(msg, t) {
  S.combat.log.push({ m: msg, t: t || 'info' });
  _renderCbt();
}

function _setCbtBtns(on) { _cbtSetBtns(on); }


// ── Player actions ─────────────────────────────────────────────────────────
function _doPlayerAttack(wep) {
  const e=S.combat.enemy;
  if(wep.type==='ranged'){sfx('pistol_shot',0.9);}else{sfx('knife_swing',0.7);setTimeout(()=>sfx('knife_hit',0.8),260);}
  const dmg=Math.max(1,_rng(wep.dmgMin,wep.dmgMax)-(e.def||0));
  e.currentHp=Math.max(0,e.currentHp-dmg);
  // Trigger animation
  const cv=document.getElementById('sc-scene');
  const W=cv?cv.width:360, H=cv?cv.height:180;
  const enmX=Math.floor(W*0.78);
  _cbtA.atkPhase=wep.type==='ranged'?'rng':'ml-out'; _cbtA.atkT=0;
  const delay=wep.type==='ranged'?160:260;
  setTimeout(()=>_cbtDmg(enmX,Math.floor(H*0.18),'-'+dmg,'#ee7744'),delay);
  cbtLog('You strike with '+wep.name+' — '+dmg+' damage! (Enemy: '+e.currentHp+'/'+e.hp+')','hit');
  if (e.currentHp<=0) { setTimeout(cbtWin,850); return; }
  _cbtSetBtns(false);
  setTimeout(_cbtEnemyTurn,900);
}

function cbtMelee() {
  if (!S.combat.playerTurn || S.combat.ended) return;
  _doPlayerAttack(S.captain.melee);
}

function cbtRanged() {
  if (!S.combat.playerTurn || S.combat.ended) return;
  if (S.combat.shotsLeft <= 0) { cbtLog('Out of shots!', 'warn'); return; }
  S.combat.shotsLeft--;
  _doPlayerAttack(S.captain.ranged);
}

function cbtPotion() {
  if (!S.combat.playerTurn || S.combat.ended) return;
  const slot = S.captain.inv.find(i => i.id === 'potion' && (i.qty||1) > 0);
  if (!slot) { cbtLog('No potions left!', 'warn'); return; }
  slot.qty = (slot.qty||1) - 1;
  if (slot.qty <= 0) S.captain.inv = S.captain.inv.filter(i => i !== slot);
  const heal = slot.heal || 20;
  S.captain.hp = Math.min(S.captain.maxHp, S.captain.hp + heal);
  cbtLog('Healing Tincture: +' + heal + ' HP. (' + S.captain.hp + '/' + S.captain.maxHp + ')', 'good');
  _setCbtBtns(false);
  setTimeout(_cbtEnemyTurn, 700);
}

function cbtReload() {
  if (!S.combat.playerTurn || S.combat.ended) return;
  if (S.combat.shotsLeft >= 3) { cbtLog('Pistol fully loaded.','info'); return; }
  const slot = S.captain.inv.find(i=>i.id==='pistol_mag'&&(i.qty||1)>0);
  if (!slot) { cbtLog('No magazines! Buy some from Mira Voss.','warn'); return; }
  slot.qty=(slot.qty||1)-1;
  if(slot.qty<=0) S.captain.inv=S.captain.inv.filter(i=>i!==slot);
  S.combat.shotsLeft=3;
  sfx('reload',0.85);
  cbtLog('You reload the Void Pistol — 3 shots ready.','good');
  _setCbtBtns(false);
  setTimeout(_cbtEnemyTurn, 700);
}

function cbtFlee() {
  if (S.combat.ended) return;
  if (Math.random() < 0.5) {
    cbtLog('You slip away into the shadows!', 'good');
    S.combat.ended = true;
    setTimeout(() => { closeCombat(); S.py = Math.min((MAP_H-2)*TILE_SIZE, S.py+2.5*TILE_SIZE); setStatus('You fled.'); }, 800);
  } else {
    cbtLog('Flee failed! The enemy strikes as you turn.', 'warn');
    _setCbtBtns(false);
    setTimeout(_cbtEnemyTurn, 500);
  }
}

// ── Enemy turn ────────────────────────────────────────────────────────────
function _cbtEnemyTurn() {
  if (S.combat.ended) return;
  const e=S.combat.enemy;
  sfxEnemyAtk(e.type||'');
  const dmg=Math.max(1,_rng(e.atk[0],e.atk[1])-S.captain.defense);
  S.captain.hp=Math.max(0,S.captain.hp-dmg);
  setTimeout(()=>sfx('player_hurt',0.75),200);
  // Trigger animation
  const cv=document.getElementById('sc-scene');
  const W=cv?cv.width:360, H=cv?cv.height:180;
  const capX=Math.floor(W*0.20);
  _cbtA.atkPhase='enm-out'; _cbtA.atkT=0;
  setTimeout(()=>_cbtDmg(capX,Math.floor(H*0.18),'-'+dmg,'#cc3333'),150);
  cbtLog(e.name+' attacks for '+dmg+' damage! (Your HP: '+S.captain.hp+'/'+S.captain.maxHp+')','hit');
  if (S.captain.hp<=0) { setTimeout(cbtDefeat,700); return; }
  setTimeout(()=>_cbtSetBtns(true),560);
}


// ── Outcomes ──────────────────────────────────────────────────────────────
function cbtWin() {
  if (S.combat.ended) return;
  S.combat.ended = true;
  const e = S.combat.enemy;
  e.alive = false;
  const xpGain = e.xp;
  S.captain.xp += xpGain;
  sfx('enemy_die',0.9);
  cbtLog('Victory! +' + xpGain + ' XP (' + S.captain.xp + '/' + xpToNext(S.captain.level) + ')', 'good');
  // Level-up loop
  let leveled = false;
  while (S.captain.xp >= xpToNext(S.captain.level)) {
    S.captain.xp -= xpToNext(S.captain.level);
    S.captain.level++;
    S.captain.maxHp += 5;
    S.captain.hp = S.captain.maxHp;
    leveled = true;
    sfx('level_up',1.0);
    cbtLog('LEVEL UP! Captain is now Level ' + S.captain.level + '! Max HP: ' + S.captain.maxHp, 'good');
  }
  // Loot rolls
  (e.loot||[]).forEach(l => {
    if (Math.random() < l.p) {
      const ex = S.captain.inv.find(i => i.id === l.id);
      if (ex) ex.qty = (ex.qty||1)+1;
      else S.captain.inv.push({ id:l.id, name:l.name, type:'component', qty:1 });
      cbtLog('Salvaged: ' + l.name, 'good');
    }
  });
  _setCbtBtns(false);
  setStatus('Defeated ' + e.name + '. +' + xpGain + ' XP');
  if (leveled) cbtLog('*** LEVEL UP! Captain is now Level ' + S.captain.level + '! ***', 'good');
  cbtLog(leveled ? 'Victory! Level up!' : 'Victory!', 'good');
  setTimeout(closeCombat, 2000);
}

function cbtDefeat() {
  if (S.combat.ended) return;
  S.combat.ended = true;
  S.captain.hp = 1;
  sfx('player_down',0.85);
  cbtLog('You collapse from your wounds... but survive at 1 HP.', 'warn');
  _setCbtBtns(false);
  setTimeout(() => { closeCombat(); setStatus('You were knocked out. Rest to recover.'); }, 2000);
}

let _shopNpc = null;
let _shopTab  = 'buy';

function openSurfShop(npc) {
  _shopNpc = npc; _shopTab = 'buy';
  document.getElementById('surf-shop-npc').textContent = npc.name;
  document.querySelectorAll('.surf-stab').forEach(b => b.classList.remove('active'));
  document.getElementById('surf-stab-buy').classList.add('active');
  _buildShopList();
  sfx('shop_open',0.6);
  document.getElementById('surf-shop').style.display = 'flex';
}
function closeSurfShop() {
  sfx('shop_close',0.5);
  const el = document.getElementById('surf-shop');
  if (el) el.style.display = 'none';
  _shopNpc = null;
}
function surfShopTab(tab) {
  _shopTab = tab;
  document.querySelectorAll('.surf-stab').forEach(b => b.classList.remove('active'));
  const tb = document.getElementById('surf-stab-' + tab);
  if (tb) tb.classList.add('active');
  _buildShopList();
}
function _buildShopList() {
  const list = document.getElementById('surf-shop-list'); if (!list) return;
  const msg  = document.getElementById('surf-shop-msg');
  const tsEl = document.getElementById('surf-shop-ts');
  if (tsEl) tsEl.textContent = S.gold + ' TS';
  list.innerHTML = '';
  const stock = SHOP_STOCK[_shopNpc?.shopId]; if (!stock) return;
  if (_shopTab === 'buy') {
    if (!stock.sells.length) {
      list.innerHTML = '<div style="padding:14px;font-size:10px;color:#443322;font-style:italic;text-align:center;">This merchant sells nothing.</div>';
      return;
    }
    stock.sells.forEach(id => {
      const def = ITEM_DEFS[id]; if (!def?.buyVal) return;
      const ok = S.gold >= def.buyVal;
      const row = document.createElement('div');
      row.className = 'surf-shop-row' + (ok ? '' : ' cant-afford');
      const sub = def.type==='potion' ? 'Restores '+def.heal+' HP' : def.type==='ammo' ? '3 shots per magazine' : '';
      row.innerHTML = '<span class="surf-shop-item-name">'+def.name+'<span class="surf-shop-item-sub">'+sub+'</span></span><span class="surf-shop-item-price">'+def.buyVal+' TS</span>';
      if (ok) row.onclick = () => _surfBuy(id);
      list.appendChild(row);
    });
    if (msg) msg.textContent = 'You have ' + S.gold + ' TS.';
  } else {
    const mult = stock.sellMult || 1;
    const sellable = S.captain.inv.filter(i => ITEM_DEFS[i.id]?.sellVal && (stock.buysAll || stock.buys?.includes(i.id)));
    if (!sellable.length) {
      list.innerHTML = '<div style="padding:14px;font-size:10px;color:#443322;font-style:italic;text-align:center;">Nothing to sell.</div>';
      return;
    }
    sellable.forEach(item => {
      const def = ITEM_DEFS[item.id]; if (!def) return;
      const price = Math.floor(def.sellVal * mult);
      const qty   = item.qty || 1;
      const row   = document.createElement('div');
      row.className = 'surf-shop-row';
      row.innerHTML = '<span class="surf-shop-item-name">'+item.name+(qty>1?' &times;'+qty:'')+'<span class="surf-shop-item-sub">'+(mult>1?'Premium buyer':'')+'</span></span><span class="surf-shop-item-price">'+price+' TS ea</span>';
      row.onclick = () => _surfSell(item.id);
      list.appendChild(row);
    });
    if (msg) msg.textContent = 'Tap item to sell one unit.';
  }
}
function _surfBuy(id) {
  const def = ITEM_DEFS[id]; if (!def?.buyVal) return;
  if (S.gold < def.buyVal) { _shopMsg('Not enough TS.'); return; }
  S.gold -= def.buyVal;
  const ex = S.captain.inv.find(i => i.id === id);
  if (ex) ex.qty = (ex.qty||1)+1;
  else S.captain.inv.push({ id, name:def.name, type:def.type, qty:1,
    ...(def.heal  ? {heal:def.heal}  : {}),
    ...(def.shots ? {shots:def.shots}: {}) });
  sfx('purchase',0.75);
  _shopMsg('Bought: ' + def.name);
  _buildShopList();
}
function _surfSell(id) {
  const stock = SHOP_STOCK[_shopNpc?.shopId]; if (!stock) return;
  const def = ITEM_DEFS[id]; if (!def) return;
  const price = Math.floor(def.sellVal * (stock.sellMult||1));
  const slot  = S.captain.inv.find(i => i.id === id); if (!slot) return;
  slot.qty = (slot.qty||1)-1;
  if (slot.qty <= 0) S.captain.inv = S.captain.inv.filter(i => i !== slot);
  S.gold += price;
  sfx('sell',0.7);
  _shopMsg('Sold for ' + price + ' TS.');
  _buildShopList();
}
function _shopMsg(t) { const el=document.getElementById('surf-shop-msg'); if(el) el.textContent=t; }

})();

// ── Stats overlay ─────────────────────────────────────────────────────────────

    cap.melee  ? cap.melee.name  + ' (' + cap.melee.dmgMin  + '-' + cap.melee.dmgMax  + ' dmg)' : null,

      <div class="stat-row"><span class="stat-label">Defense</span><span class="stat-val">${cap.defense}</span></div>

    <div class="stat-section">
      <div class="stat-title">Equipped</div>
      ${gear.map(g=>'<div class="stat-row"><span class="stat-val" style="color:#887755;">'+g+'</span></div>').join('')}
    </div>
    <div class="stat-section">
      <div class="stat-title">Session</div>
      <div class="stat-row"><span class="stat-label">Day</span><span class="stat-val">${S.day}</span></div>
      <div class="stat-row"><span class="stat-label">Hours awake</span><span class="stat-val">${S.hoursAwake.toFixed(1)}</span></div>

}

// ── Inventory overlay ─────────────────────────────────────────────────────────
function _buildInv() {
  const el = document.getElementById('surf-inv-body'); if (!el) return;
  const inv = S.captain.inv;
  if (!inv.length) { el.innerHTML = '<div class="inv-empty">Pack is empty.</div>'; return; }
  el.innerHTML = '';
  inv.forEach((item, idx) => {
    const def = ITEM_DEFS[item.id] || {};
    const qty  = item.qty || 1;
    const sub  = item.type==='potion' ? 'Restores '+item.heal+' HP'
               : item.type==='ammo'   ? '3 shots per magazine'
               : item.type==='material' ? 'Sell value: '+(def.sellVal||'?')+' TS'
               : '';
    const canUse = item.type==='potion' && S.captain.hp < S.captain.maxHp;
    const row = document.createElement('div');
    row.className = 'inv-item';
    row.innerHTML =
      '<span class="inv-item-name">'+item.name+'<span class="inv-item-sub">'+sub+'</span></span>'+
      '<span class="inv-item-qty">x'+qty+'</span>';
    if (item.type==='potion') {
      const btn = document.createElement('button');
      btn.className = 'inv-use-btn';
      btn.textContent = 'Use';
      btn.disabled = !canUse;
      btn.onclick = () => { _surfUsePotion(idx); _buildInv(); };
      row.appendChild(btn);
    }
    el.appendChild(row);
  });
}
function _surfUsePotion(idx) {
  const item = S.captain.inv[idx];
  if (!item || item.type !== 'potion') return;
  if (S.captain.hp >= S.captain.maxHp) { setStatus('Already at full HP.'); return; }
  const heal = item.heal || 20;
  S.captain.hp = Math.min(S.captain.maxHp, S.captain.hp + heal);
  item.qty = (item.qty||1) - 1;
  if (item.qty <= 0) S.captain.inv.splice(idx, 1);
  sfx('player_hurt', 0.4); // soft heal tone (use player_hurt in reverse; or add a heal sfx later)
  setStatus('Used Healing Tincture. HP: '+S.captain.hp+'/'+S.captain.maxHp);
}

// ── Save / Load ───────────────────────────────────────────────────────────────
function _surfBuildSave(label) {
  return {
    label,
    timestamp: Date.now(),
    day: S.day,
    gold: S.gold,
    hp: S.captain.hp,
    maxHp: S.captain.maxHp,
    level: S.captain.level,
    xp: S.captain.xp,
    captain: JSON.parse(JSON.stringify(S.captain)),
    px: S.px, py: S.py,
    enemies: S.enemies.map(e=>({alive:e.alive, currentHp:e.currentHp, tx:e.tx, ty:e.ty, type:e.type})),
  };
}
function _surfApplySave(save) {
  if (!save) return false;
  try {
    S.day       = save.day       || 1;
    S.gold      = save.gold      || 0;
    S.px        = save.px        || S.px;
    S.py        = save.py        || S.py;
    S.captain   = { ...S.captain, ...save.captain };
    // Restore nested objects
    ['melee','ranged','armor','helmet','inv'].forEach(k => { if (save.captain?.[k]) S.captain[k]=save.captain[k]; });
    // Restore enemy state
    if (save.enemies && save.enemies.length === S.enemies.length) {
      save.enemies.forEach((se, i) => {
        if (S.enemies[i]) { S.enemies[i].alive=se.alive; S.enemies[i].currentHp=se.currentHp; }
      });
    }
    updateHUD();
    setStatus('Save loaded. Welcome back, Captain.');
    return true;
  } catch(_) { return false; }
}
function surfAutoSave() {
  try {
    const save = _surfBuildSave('Auto');
    localStorage.setItem(SURF_AUTO_KEY, JSON.stringify(save));
  } catch(_) {}
}
function _buildSaveSlots() {
  const el = document.getElementById('surf-save-body'); if (!el) return;
  el.innerHTML = '';
  // Manual save button
  const saveNowRow = document.createElement('div');
  saveNowRow.style.cssText = 'display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;';
  [0,1,2].forEach(slot => {
    const b = document.createElement('button');
    b.className = 'save-btn'; b.style.flex='1';
    b.textContent = 'Save Slot '+(slot+1);
    b.onclick = () => { _surfSaveToSlot(slot); _buildSaveSlots(); sfx('purchase',0.6); };
    saveNowRow.appendChild(b);
  });
  el.appendChild(saveNowRow);
  // Auto save slot
  const autoLbl = document.createElement('div');
  autoLbl.className = 'save-autosave-lbl'; autoLbl.textContent = 'Auto Save';
  el.appendChild(autoLbl);
  try {
    const auto = JSON.parse(localStorage.getItem(SURF_AUTO_KEY)||'null');
    el.appendChild(_makeSaveSlotRow(auto, 'auto'));
  } catch(_) { el.appendChild(_makeSaveSlotRow(null,'auto')); }
  // Manual slots
  const manualLbl = document.createElement('div');
  manualLbl.className = 'save-autosave-lbl'; manualLbl.style.marginTop='8px'; manualLbl.textContent = 'Manual Saves';
  el.appendChild(manualLbl);
  let saves = [];
  try { saves = JSON.parse(localStorage.getItem(SURF_SAVE_KEY)||'[]'); } catch(_) {}
  [0,1,2].forEach(slot => {
    el.appendChild(_makeSaveSlotRow(saves[slot]||null, slot));
  });
}
function _makeSaveSlotRow(save, slot) {
  const row = document.createElement('div'); row.className = 'save-slot-row';
  const info = document.createElement('div'); info.className = 'save-slot-info';
  if (save) {
    const d = new Date(save.timestamp).toLocaleString();
    info.innerHTML =
      '<div class="save-slot-name">'+(slot==='auto'?'&#128260; Auto':('&#128190; Slot '+(slot+1)))+' — Lv '+save.level+'</div>'+
      '<div class="save-slot-detail">Day '+save.day+' &nbsp;|&nbsp; '+save.gold+' TS &nbsp;|&nbsp; HP '+save.hp+'/'+save.maxHp+'</div>'+
      '<div class="save-slot-detail" style="color:#332211;">'+d+'</div>';
  } else {
    info.innerHTML = '<div class="save-slot-name" style="color:#332211;">— Empty —</div>';
  }
  row.appendChild(info);
  const btns = document.createElement('div'); btns.className = 'save-slot-btns';
  if (save) {
    const lb = document.createElement('button'); lb.className='save-btn save-btn-load'; lb.textContent='Load';
    lb.onclick = () => { if(_surfApplySave(save)) surfCloseOvl('save'); };
    btns.appendChild(lb);
    if (slot !== 'auto') {
      const db = document.createElement('button'); db.className='save-btn save-btn-del'; db.textContent='Del';
      db.onclick = () => { _surfDeleteSlot(slot); _buildSaveSlots(); };
      btns.appendChild(db);
    }
  }
  row.appendChild(btns);
  return row;
}
function _surfSaveToSlot(slot) {
  let saves = [];
  try { saves = JSON.parse(localStorage.getItem(SURF_SAVE_KEY)||'[]'); } catch(_) {}
  saves[slot] = _surfBuildSave('Slot '+(slot+1));
  try { localStorage.setItem(SURF_SAVE_KEY, JSON.stringify(saves)); } catch(_) {}
  setStatus('Saved to Slot '+(slot+1)+'.');
}
function _surfDeleteSlot(slot) {
  let saves = [];
  try { saves = JSON.parse(localStorage.getItem(SURF_SAVE_KEY)||'[]'); } catch(_) {}
  saves[slot] = null;
  try { localStorage.setItem(SURF_SAVE_KEY, JSON.stringify(saves)); } catch(_) {}
}

// ── Minimap ───────────────────────────────────────────────────────────────────
let _mmMinimized = localStorage.getItem('surf_mm_min') === '1';
function surfMinimapToggle() {
  _mmMinimized = !_mmMinimized;
  localStorage.setItem('surf_mm_min', _mmMinimized ? '1' : '0');
  const shell = document.getElementById('surf-minimap-shell');
  const btn   = document.getElementById('surf-minimap-toggle');
  if (shell) shell.classList.toggle('minimized', _mmMinimized);
  if (btn)   btn.textContent = 'MAP ' + (_mmMinimized ? '&#9650;' : '&#9660;');
  // Force innerHTML so HTML entities render
  if (btn) btn.innerHTML = 'MAP ' + (_mmMinimized ? '&#9650;' : '&#9660;');
}
// Apply initial state
(function(){
  if (_mmMinimized) {
    const shell = document.getElementById('surf-minimap-shell');
    if (shell) shell.classList.add('minimized');
    const btn = document.getElementById('surf-minimap-toggle');
    if (btn) btn.innerHTML = 'MAP &#9650;';
  }
})();

function _drawMinimap() {
  const cv = document.getElementById('surf-minimap');
  if (!cv || _mmMinimized) return;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const R = W / 2;
  // Clip to circle
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.beginPath(); ctx.arc(R,R,R-1,0,Math.PI*2); ctx.clip();
  // Tile scale: fit entire map into minimap canvas
  const tW = W / MAP_W, tH = H / MAP_H;
  // Tile colours
  const TILE_COL = {
    0:'#142008', 1:'#1a1206', 2:'#1a1a12', 3:'#0a1804',
    4:'#0a0808', 5:'#0a0808', 8:'#282214', 9:'#1a1208',
    10:'#2a1c0a', 15:'#0a0808',
  };
  for (let ty=0; ty<MAP_H; ty++) {
    for (let tx=0; tx<MAP_W; tx++) {
      const t = MAP_TILES[ty*MAP_W+tx] ?? 0;
      ctx.fillStyle = TILE_COL[t] || '#0a0a08';
      ctx.fillRect(tx*tW, ty*tH, Math.ceil(tW), Math.ceil(tH));
    }
  }
  // Enemies
  S.enemies.forEach(e => {
    if (!e.alive) return;
    ctx.fillStyle = '#cc3333';
    ctx.beginPath(); ctx.arc(e.tx*tW+tW/2, e.ty*tH+tH/2, Math.max(1.5,tW*0.6), 0, Math.PI*2);
    ctx.fill();
  });
  // NPCs
  NPCS.forEach(n => {
    ctx.fillStyle = '#44aaff';
    ctx.beginPath(); ctx.arc(n.tx*tW+tW/2, n.ty*tH+tH/2, Math.max(1.2,tW*0.5), 0, Math.PI*2);
    ctx.fill();
  });
  // Player
  const px = (S.px/TILE_SIZE)*tW, py = (S.py/TILE_SIZE)*tH;
  ctx.fillStyle = '#ffee44';
  ctx.beginPath(); ctx.arc(px, py, Math.max(2, tW*0.75), 0, Math.PI*2);
  ctx.fill();
  // Border
  ctx.restore();
  ctx.strokeStyle = 'rgba(180,140,60,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(R,R,R-1,0,Math.PI*2); ctx.stroke();
}

// ── Init ──────────────────────────────────────────────────────────────────
function init(){
  loadEntryData();
  _loadSurfSounds();
  initEnemies();
  if (!S.captain.gearGiven) initStarterGear();

  // Fade in
  const ov = document.getElementById('transition-overlay');
  ov.classList.add('fade-in');
  setTimeout(() => {
    ov.style.transition = 'opacity 0.5s ease';
    ov.classList.remove('fade-in');
    ov.classList.add('fade-out');
    setTimeout(() => { ov.style.transition = ''; }, 600);
  }, 100);

  // Start loop once images have had a moment to load
  setTimeout(() => { loop(performance.now()); }, 200);
}

init();
</script>
